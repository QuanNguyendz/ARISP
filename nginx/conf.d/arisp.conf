#   4. Bỏ comment dòng ssl_certificate trong docker-compose.prod.yml
#   5. Đăng ký URI callback mới trong Google Cloud Console:
#      https://yourdomain.com/api/auth/external/google-callback
#   6. Cập nhật AdminFrontendUrl trong appsettings.Production.json → https://yourdomain.com

