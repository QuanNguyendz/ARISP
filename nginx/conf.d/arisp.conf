# ============================================================
# ARISP – Nginx Site Config
#
# Dev (HTTP):  Block "Development" bên dưới đang active
# Prod (HTTPS): Comment block Dev, bỏ comment block Production
# ============================================================

# ─── Shared proxy settings ────────────────────────────────────────────────────
# Định nghĩa trong map để dùng lại ở cả 2 block
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Development (HTTP only) ──────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Bắt buộc: ASP.NET Core đọc header này để biết scheme thật là gì.
    # Khi dev HTTP, $scheme = "http" → không ảnh hưởng gì.
    # Khi prod HTTPS, block này bị thay bằng block production bên dưới.
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Host              $host;
    proxy_redirect   off;

    # Backend API (REST)
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection keep-alive;
    }

    # SignalR + WebRTC hubs (WebSocket upgrade)
    location /hubs/ {
        proxy_pass         http://backend:5000/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }

    # Static uploads (CV files, etc.)
    location /uploads/ {
        proxy_pass         http://backend:5000/uploads/;
        proxy_http_version 1.1;
    }

    # Frontend React app
    location / {
        proxy_pass         http://frontend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}

# ─── Production (HTTPS) ───────────────────────────────────────────────────────
# Khi sẵn sàng deploy HTTPS:
#   1. Comment hết block "Development" bên trên
#   2. Bỏ comment 2 block bên dưới
