<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ARISP Static Root</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f3f4f6;
        color: #111827;
      }
      .card {
        max-width: 560px;
        padding: 2rem;
        text-align: center;
        background: #ffffff;
        border-radius: 1rem;
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 1rem;
        font-size: 2rem;
      }
      p {
        margin: 0.75rem 0;
        line-height: 1.7;
      }
      code {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.35rem 0.5rem;
        border-radius: 0.5rem;
        background: #f9fafb;
        color: #111827;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>ARISP</h1>
      <p>This directory no longer contains Firebase Hosting content.</p>
      <p>If you need the frontend application, open <code>frontend/</code> in the repository.</p>
    </div>
  </body>
</html>
