<!DOCTYPE html>
<html lang="en">

        color: #111827;

      .card {

      }
      p {

        line-height: 1.7;
      }
      code {
        display: inline-block;
        padding: 0.35rem 0.55rem;
        border-radius: 0.5rem;
        background: #f8fafc;
        color: #111827;
      }

  </head>
  <body>
    <div class="card">
      <h1>404 — Page not found</h1>
