# ============================================
# ARISP – Docker Compose (Production Override)
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# ============================================

services:
  # --- Backend: production build ---
  backend:
    build:
      target: production
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes: []  # No source mount in production
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # --- Frontend: serve static build via nginx ---
  frontend:
    build:
      target: production
    volumes: []  # No source mount in production
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # --- Redis ---
  redis:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # --- Nginx: add SSL volumes for production ---
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - ../nginx/sites-available:/etc/nginx/sites-available:ro
      # Uncomment when SSL is configured:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
