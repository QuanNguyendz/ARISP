# ============================================
# ARISP – Docker Compose (Development)
# Usage: docker compose up --build
# ============================================

services:
  # --- ASP.NET Core Backend ---
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    container_name: arisp-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      # ADR-039: chọn RAG microservice Python. Đặt AI_PROVIDER=rag để dùng service Python.
      - RAG_SERVICE_URL=http://rag-service:8000
    volumes:
      - ../backend:/app/src
    depends_on:
      redis:
        condition: service_healthy
      rag-service:
        condition: service_started
    networks:
      - arisp-network
    restart: unless-stopped

  # --- RAG Interview Microservice (Python / FastAPI + LangChain) — ADR-039 ---
  # Nội bộ: KHÔNG route qua Nginx. Backend gọi qua http://rag-service:8000.
  rag-service:
    build:
      context: ../rag-service
      dockerfile: ../docker/rag/Dockerfile
      target: development
    container_name: arisp-rag
    ports:
      - "8000:8000"   # expose ra host chỉ để dev/test Swagger; prod gỡ bỏ nếu muốn
    env_file:
      - .env
    volumes:
      - ../rag-service:/app
    networks:
      - arisp-network
    restart: unless-stopped

  # --- React Frontend ---
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    container_name: arisp-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - arisp-network
    restart: unless-stopped

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: arisp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arisp-network
    restart: unless-stopped

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:1.27-alpine
    container_name: arisp-nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
    depends_on:
      - backend
      - frontend
    networks:
      - arisp-network
    restart: unless-stopped

networks:
  arisp-network:
    driver: bridge

volumes:
  redis-data:
